name: Deploy ProLnk

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.4.1'

jobs:
  # ─── Type Check & Build ──────────────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm check

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production
          # Build-time env vars (non-secret)
          VITE_APP_ID: ${{ secrets.VITE_APP_ID }}

  # ─── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: 'mysql://test:test@localhost:3306/prolnk_test'

  # ─── Deploy to Railway ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service prolnk-app
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Run DB migrations
        run: railway run --service prolnk-app node scripts/run-migration.mjs
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        continue-on-error: true

      - name: Sync knowledge base to Qdrant
        run: railway run --service prolnk-app node scripts/sync-knowledge-base.mjs
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        continue-on-error: true

  # ─── Notify on failure ────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build, test, deploy]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Send email notification
        run: |
          curl -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "ProLnk CI <noreply@prolnk.io>",
              "to": ["${{ secrets.OWNER_EMAIL }}"],
              "subject": "❌ ProLnk deployment failed — branch: main",
              "text": "The latest deployment to Railway failed. Check GitHub Actions for details: https://github.com/${{ github.repository }}/actions"
            }'
