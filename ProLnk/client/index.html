<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ProLnk — AI-Powered Home Service Partner Network</title>
    <meta name="description" content="ProLnk connects trusted home service professionals through AI-powered referrals. Every job photo becomes a lead. Every partner earns more." />
    <meta name="keywords" content="ProLnk, home service referrals, AI lead generation, partner network, home services, DFW contractors" />
    <link rel="canonical" href="https://prolnk.io/" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="ProLnk" />
    <meta property="og:title" content="ProLnk — AI-Powered Home Service Partner Network" />
    <meta property="og:description" content="ProLnk connects trusted home service professionals through AI-powered referrals. Every job photo becomes a lead." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://prolnk.io/" />
    <meta property="og:site_name" content="ProLnk" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@prolnk" />
    <meta name="twitter:title" content="ProLnk — AI-Powered Home Service Partner Network" />
    <meta name="twitter:description" content="Every job photo becomes a lead. Join the ProLnk partner network." />
    <meta name="geo.region" content="US-TX" />
    <meta name="geo.placename" content="Dallas-Fort Worth, Texas" />
    <meta property="og:image" content="https://prolnk.io/og-image.png" />
    <meta name="twitter:image" content="https://prolnk.io/og-image.png" />
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "ProLnk",
        "url": "https://prolnk.io",
        "logo": "https://prolnk.io/icon-192.png",
        "description": "AI-powered home service partner network connecting trusted professionals through referrals and automated payments",
        "areaServed": { "@type": "State", "name": "Texas" },
        "contactPoint": { "@type": "ContactPoint", "contactType": "customer service", "areaServed": "US", "availableLanguage": "English" },
        "sameAs": ["https://trustypro.io"]
      },
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "TrustyPro",
        "applicationCategory": "HomeAndGarden",
        "operatingSystem": "Web, iOS, Android",
        "description": "AI-powered home maintenance platform connecting homeowners with verified service professionals",
        "offers": {
          "@type": "Offer",
          "price": "29.99",
          "priceCurrency": "USD",
          "priceSpecification": { "@type": "UnitPriceSpecification", "billingDuration": "P1M" }
        }
      }
    ]
    </script>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A1628" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ProLnk" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => console.log('[SW] Registered, scope:', reg.scope))
            .catch(err => console.warn('[SW] Registration failed:', err));
        });
      }
    </script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
