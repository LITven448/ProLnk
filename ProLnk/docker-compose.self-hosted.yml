version: "3.9"

# ProLnk Self-Hosted Services
# Run: docker compose -f docker-compose.self-hosted.yml up -d
# These services support the AI stack — run on your own server or Railway

services:

  # ─── Qdrant — Vector Database (Knowledge Base + Embeddings) ─────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: prolnk-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Langfuse — LLM Observability ────────────────────────────────────────────
  langfuse-server:
    image: langfuse/langfuse:latest
    container_name: prolnk-langfuse
    ports:
      - "3010:3000"
    depends_on:
      - langfuse-db
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=${LANGFUSE_AUTH_SECRET:-change-me-in-production}
      - SALT=${LANGFUSE_SALT:-change-me-in-production}
      - NEXTAUTH_URL=http://localhost:3010
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=true
    restart: unless-stopped

  langfuse-worker:
    image: langfuse/langfuse-worker:latest
    container_name: prolnk-langfuse-worker
    depends_on:
      - langfuse-db
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
    restart: unless-stopped

  langfuse-db:
    image: postgres:15-alpine
    container_name: prolnk-langfuse-db
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ─── PostHog — Product Analytics ─────────────────────────────────────────────
  posthog:
    image: posthog/posthog:latest
    container_name: prolnk-posthog
    ports:
      - "8000:8000"
    depends_on:
      - posthog-db
      - posthog-redis
    environment:
      - DATABASE_URL=postgres://posthog:posthog@posthog-db:5432/posthog
      - REDIS_URL=redis://posthog-redis:6379
      - SECRET_KEY=${POSTHOG_SECRET_KEY:-change-me-in-production}
      - SITE_URL=http://localhost:8000
      - DISABLE_SECURE_SSL_REDIRECT=1
      - IS_BEHIND_PROXY=1
    restart: unless-stopped

  posthog-db:
    image: postgres:15-alpine
    container_name: prolnk-posthog-db
    environment:
      - POSTGRES_USER=posthog
      - POSTGRES_PASSWORD=posthog
      - POSTGRES_DB=posthog
    volumes:
      - posthog_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  posthog-redis:
    image: redis:7-alpine
    container_name: prolnk-posthog-redis
    restart: unless-stopped

  # ─── LangGraph AI Pipeline ──────────────────────────────────────────────────
  langgraph:
    build: ./langgraph
    container_name: prolnk-langgraph
    ports:
      - "8100:8100"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ATTOM_API_KEY=${ATTOM_API_KEY}
      - PROLNK_API_URL=http://host.docker.internal:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  qdrant_data:
  langfuse_db_data:
  posthog_db_data:
